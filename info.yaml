  title:        "Tiny Tapeout simple dft"      # Project title
  author:       "Jakub Rachon"      # Your name
  discord:      "magnetofield"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Showcase how to increase cells usage by insterting simple dft"      # One line description of what your project does
